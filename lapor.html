<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Laporan Tim</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-3">

<div class="card shadow-sm p-4">
    <h4 class="fw-bold mb-3">📝 Lapor Kerja Tim</h4>
    <form id="formLapor">
        <div class="mb-3">
            <label class="form-label">Pilih Tim</label>
            <select id="pilihTim" class="form-select" required>
                <option value="Persiapan">Tim Persiapan</option>
                <option value="Pengolahan">Tim Pengolahan</option>
                <option value="Pemorsian">Tim Pemorsian</option>
                <option value="Cuci Ompreng">Tim Cuci Ompreng</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Nama Anggota</label>
            <input type="text" id="nama" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Status</label>
            <select id="status" class="form-select">
                <option value="Hadir">Hadir</option>
                <option value="Izin">Izin</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Jam (Masuk/Pulang)</label>
            <input type="time" id="jam" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Foto Kegiatan</label>
            <input type="file" id="foto" class="form-control" accept="image/*">
        </div>
        <button type="submit" class="btn btn-primary w-100">Kirim Laporan</button>
    </form>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script>
    // Inisialisasi Firebase sama dengan admin.html
    // ...

    document.getElementById('formLapor').addEventListener('submit', (e) => {
        e.preventDefault();
        const tim = document.getElementById('pilihTim').value;
        const nama = document.getElementById('nama').value;
        const status = document.getElementById('status').value;
        const jam = document.getElementById('jam').value;

        // Simpan ke Firestore
        db.collection("divisi_status").add({
            nama_divisi: tim,
            nama_anggota: nama,
            status: status,
            jam_masuk: jam, // Sesuaikan logika masuk/pulang
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => {
            alert("Laporan terkirim!");
            window.location.reload();
        });
    });
</script>
</body>
</html>
