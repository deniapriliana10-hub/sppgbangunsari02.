<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Laporan Tim - SPPG Bangunsari 02</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-blue: #1e6091;
            --dark-blue: #0f172a;
            --light-bg: #f4f7fa;
            --card-border: rgba(30, 96, 145, 0.1);
        }
        body { 
            background-color: var(--light-bg); 
            color: #334155;
            font-family: 'Urbanist', sans-serif;
            padding: 20px 0;
        }
        .main-card {
            border: 1px solid var(--card-border);
            border-radius: 20px;
            background: #ffffff;
            box-shadow: 0 15px 35px rgba(30, 96, 145, 0.05);
            overflow: hidden;
        }
        .card-header-custom {
            background: linear-gradient(135deg, var(--primary-blue), #164e63);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .form-label {
            font-weight: 600;
            color: var(--dark-blue);
            font-size: 14px;
            margin-bottom: 8px;
        }
        .form-control, .form-select {
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            padding: 12px 15px;
            font-size: 15px;
            transition: all 0.2s;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(30, 96, 145, 0.15);
        }
        .anggota-row {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            position: relative;
        }
        .btn-remove {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .btn-submit {
            background-color: var(--primary-blue);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.2s;
        }
        .btn-submit:hover {
            background-color: #154a73;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-7">
            
            <div class="card main-card">
                <div class="card-header-custom">
                    <i class="fa-solid fa-clipboard-list fa-3x mb-3"></i>
                    <h3 class="fw-bold mb-1">LAPOR KERJA TIM (MASSAL)</h3>
                    <p class="text-white-50 small mb-0">SPPG Bangunsari 02 - Operasional Harian</p>
                </div>
                
                <div class="card-body p-4">
                    <form id="formLapor">
                        <div class="mb-4">
                            <label class="form-label"><i class="fa-solid fa-users me-1 text-primary"></i> Pilih Divisi / Tim</label>
                            <select id="pilihTim" class="form-select" required>
                                <option value="" disabled selected hidden>Pilih tim Anda...</option>
                                <option value="Persiapan">Tim Persiapan</option>
                                <option value="Pengolahan">Tim Pengolahan</option>
                                <option value="Pemorsian">Tim Pemorsian</option>
                                <option value="Cuci Ompreng">Tim Cuci Ompreng</option>
                            </select>
                        </div>

                        <div class="row mb-4">
                            <div class="col-6">
                                <label class="form-label"><i class="fa-solid fa-clock text-primary"></i> Jenis Absen</label>
                                <select id="tipeJam" class="form-select">
                                    <option value="masuk">Jam Masuk</option>
                                    <option value="pulang">Jam Pulang</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label class="form-label">Waktu</label>
                                <input type="time" id="jam" class="form-control" required>
                            </div>
                        </div>

                        <hr class="my-4">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="fw-bold text-dark mb-0"><i class="fa-solid fa-user-group text-primary me-1"></i> Daftar Anggota</h5>
                            <button type="button" class="btn btn-outline-primary btn-sm fw-bold rounded-pill px-3" id="btnTambahAnggota">
                                <i class="fa-solid fa-plus me-1"></i> Tambah Baris Anggota
                            </button>
                        </div>

                        <div id="wrapperAnggota"></div>

                        <button type="submit" id="btnSubmit" class="btn btn-primary btn-submit w-100 text-white shadow-sm mt-3">
                            <i class="fa-solid fa-paper-plane me-1"></i> Kirim Semua Laporan
                        </button>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
    // Konfigurasi Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDeOduyu626TZ9CR0JGvzBH0qJAoArT8rk",
        authDomain: "sppgbangunsari02-b5cb1.firebaseapp.com",
        projectId: "sppgbangunsari02-b5cb1",
        storageBucket: "sppgbangunsari02-b5cb1.firebasestorage.app",
        messagingSenderId: "497486447370",
        appId: "1:497486447370:web:0b2b6ce4297b48d18b70f3",
        measurementId: "G-TE7G4NTT96"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const appsScriptUrl = "https://script.google.com/macros/s/AKfycbwLgcPFVU_7uYLiTUbdld7CtvRcCeg576olUz2UaWgogkaPEfasL5BdJGsuTv7WX3Bg/exec";
    
    let counterAnggota = 0;
    let dataGambarMap = {}; // Menampung base64 tiap baris

    // Fungsi membuat baris form anggota baru secara otomatis
    function tambahBarisAnggota() {
        counterAnggota++;
        const idRow = counterAnggota;
        const html = `
            <div class="anggota-row animate__animated animate__fadeIn" id="row-${idRow}">
                ${idRow > 1 ? `<button type="button" class="btn-remove" onclick="hapusBarisAnggota(${idRow})"><i class="fa-solid fa-xmark"></i></button>` : ''}
                <div class="row g-2">
                    <div class="col-md-6 mb-2">
                        <label class="form-label small text-muted">Nama Anggota #${idRow}</label>
                        <input type="text" class="form-control input-nama" placeholder="Nama lengkap" required>
                    </div>
                    <div class="col-md-6 mb-2">
                        <label class="form-label small text-muted">Kehadiran</label>
                        <select class="form-select input-status">
                            <option value="Hadir">Hadir</option>
                            <option value="Izin">Izin</option>
                            <option value="Sakit">Sakit</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label small text-muted">Foto Kegiatan</label>
                        <input type="file" class="form-control input-foto" accept="image/*" capture="environment" onchange="prosesGambarBaris(this, ${idRow})">
                        <div id="prev-box-${idRow}" style="display:none;" class="mt-2 text-center bg-white p-2 rounded border">
                            <img id="img-prev-${idRow}" style="max-height:100px; border-radius:5px;">
                        </div>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('wrapperAnggota').insertAdjacentHTML('beforeend', html);
    }

    // Hapus Baris Anggota jika kelebihan
    function hapusBarisAnggota(idRow) {
        document.getElementById(`row-${idRow}`).remove();
        delete dataGambarMap[idRow];
    }

    // Proses konversi gambar per baris ke base64
    function prosesGambarBaris(input, idRow) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                dataGambarMap[idRow] = e.target.result;
                document.getElementById(`img-prev-${idRow}`).src = e.target.result;
                document.getElementById(`prev-box-${idRow}`).style.display = "block";
            }
            reader.readAsDataURL(file);
        }
    }

    // Saat halaman dimuat, munculkan 1 baris pertama secara otomatis
    tambahBarisAnggota();

    // Tombol tambah baris di-klik
    document.getElementById('btnTambahAnggota').addEventListener('click', tambahBarisAnggota);

    // Kirim seluruh data ke Firebase secara bersamaan menggunakan Batch
    document.getElementById('formLapor').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const btn = document.getElementById('btnSubmit');
        const tim = document.getElementById('pilihTim').value;
        const tipeJam = document.getElementById('tipeJam').value;
        const jam = document.getElementById('jam').value;

        const rows = document.querySelectorAll('.anggota-row');
        if(rows.length === 0) {
            alert("Silakan tambah minimal satu anggota!");
            return;
        }

        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-1"></i> Mengirim Semua Data Laporan...';
        btn.disabled = true;

        try {
            const batch = db.batch();

            // Looping membaca semua data di setiap baris anggota
            for (let i = 0; i < rows.length; i++) {
                const row = rows[i];
                // Mengambil internal ID numerik dari element row id (cth: row-1 -> 1)
                const internalId = row.id.split('-')[1]; 
                
                const nama = row.querySelector('.input-nama').value.trim();
                const status = row.querySelector('.input-status').value;
                const gambarBase64 = dataGambarMap[internalId] || "";

                let urlFotoDrive = "";

                // Upload foto ke Google Drive jika ada file di baris tersebut
                if (gambarBase64) {
                    btn.innerHTML = `⏳ Mengunggah foto ${nama}...`;
                    const uploadResponse = await fetch(appsScriptUrl, {
                        method: "POST",
                        body: JSON.stringify({
                            nama_sekolah: `${tim}_${nama}`,
                            gambar: gambarBase64
                        })
                    });
                    const uploadResult = await uploadResponse.json();
                    if (uploadResult.status === "success") {
                        urlFotoDrive = uploadResult.url;
                    }
                }

                // Struktur Payload Dokumen
                const docId = `${tim}_${nama.replace(/\s+/g, '_').toLowerCase()}`;
                const docRef = db.collection("divisi_status").doc(docId);

                const dataPayload = {
                    nama_divisi: tim,
                    nama_anggota: nama,
                    status: status,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                };

                if (tipeJam === "masuk") {
                    dataPayload.jam_masuk = jam + " WIB";
                } else {
                    dataPayload.jam_pulang = jam + " WIB";
                }

                if (urlFotoDrive) {
                    dataPayload.foto_kegiatan = urlFotoDrive;
                }

                // Masukkan perintah update ke antrean batch
                batch.set(docRef, dataPayload, { merge: true });
            }

            // Eksekusi semua data ke Firebase sekaligus dalam 1 kali tembak
            await batch.commit();

            alert("Hebat! Semua laporan anggota tim berhasil dikirim serentak!");
            window.location.reload();

        } catch (error) {
            console.error(error);
            alert("Gagal mengirim laporan massal: " + error.message);
            btn.innerHTML = '<i class="fa-solid fa-paper-plane me-1"></i> Kirim Semua Laporan';
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
