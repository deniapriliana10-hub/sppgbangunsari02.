<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Checklist - SPPG BANGUNSARI 02</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-guard: #1e3a8a;
            --secondary-guard: #3b82f6;
            --light-bg: #f8fafc;
            --card-border: rgba(30, 58, 138, 0.1);
        }
        body { 
            background-color: var(--light-bg); 
            color: #334155;
            font-family: 'Urbanist', sans-serif;
            padding-bottom: 60px;
        }
        .navbar-security { 
            background: linear-gradient(135deg, var(--primary-guard), #1e293b); 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .panel-title {
            border-left: 5px solid var(--secondary-guard);
            padding-left: 15px;
            margin: 30px 0;
        }
        .card-custom { 
            border: 1px solid var(--card-border); 
            border-radius: 16px; 
            background-color: #ffffff;
            box-shadow: 0 10px 25px rgba(30, 58, 138, 0.04); 
        }
        .task-item {
            padding: 15px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            margin-bottom: 12px;
            transition: all 0.2s ease;
            background: #fff;
        }
        .task-item:hover {
            border-color: var(--secondary-guard);
        }
        .form-check-input:checked + .form-check-label {
            color: #166534;
            font-weight: bold;
            text-decoration: line-through;
        }
        .time-badge {
            font-size: 12px;
            font-weight: bold;
            color: #475569;
            background: #e2e8f0;
            padding: 4px 10px;
            border-radius: 20px;
        }
        .btn-guard {
            background-color: var(--primary-guard);
            color: white;
            border-radius: 12px;
            padding: 14px;
            font-weight: 700;
            border: none;
            width: 100%;
        }
        .btn-guard:hover { background-color: #172554; color: white; }
        .btn-tambah-tugas {
            font-size: 14px;
            font-weight: 700;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-security py-3">
    <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="#">
            <i class="fa-solid fa-shield-halved"></i> CHECKLIST SECURITY
        </a>
        <button class="btn btn-outline-light btn-sm fw-bold px-3 rounded-pill" id="btnLogout">
            <i class="fa-solid fa-right-from-bracket me-1"></i> Keluar
        </button>
    </div>
</nav>

<div class="container">
    <div class="panel-title">
        <h2 class="fw-bold text-dark mb-1">Kontrol Area & Tugas Keamanan</h2>
        <p class="text-secondary mb-0">Pilih nama, centang tugas pokok, atau tuliskan tugas mandiri tambahan Anda.</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card card-custom p-4">
                <form id="formChecklist">
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold small text-secondary">Pilih Personil Jaga</label>
                        <select id="namaSecurity" class="form-select form-select-lg" required>
                            <option value="" disabled selected>-- Pilih Nama Security --</option>
                            <option value="Security 1">Security 1</option>
                            <option value="Security 2">Security 2</option>
                        </select>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <label class="form-label fw-bold small text-secondary mb-0">Daftar Tugas Pokok & Tambahan</label>
                        <button type="button" class="btn btn-outline-primary btn-sm btn-tambah-tugas" onclick="tambahTugasKustom()">
                            <i class="fa-solid fa-plus me-1"></i> Tulis Tugas Lain
                        </button>
                    </div>
                    
                    <div id="containerDaftarTugas">
                        
                        <div class="task-item d-flex justify-content-between align-items-center">
                            <div class="form-check m-0">
                                <input class="form-check-input chk-task" type="checkbox" value="Cek Area Dapur" id="task1" onchange="catatWaktu(this, 'time1')">
                                <label class="form-check-label ms-2" for="task1">Cek Area Dapur</label>
                            </div>
                            <span id="time1" class="time-badge">Belum</span>
                        </div>

                        <div class="task-item d-flex justify-content-between align-items-center">
                            <div class="form-check m-0">
                                <input class="form-check-input chk-task" type="checkbox" value="Cek Area Parkiran" id="task2" onchange="catatWaktu(this, 'time2')">
                                <label class="form-check-label ms-2" for="task2">Cek Area Parkiran</label>
                            </div>
                            <span id="time2" class="time-badge">Belum</span>
                        </div>

                        <div class="task-item d-flex justify-content-between align-items-center">
                            <div class="form-check m-0">
                                <input class="form-check-input chk-task" type="checkbox" value="Cek Listrik" id="task3" onchange="catatWaktu(this, 'time3')">
                                <label class="form-check-label ms-2" for="task3">Cek Listrik</label>
                            </div>
                            <span id="time3" class="time-badge">Belum</span>
                        </div>

                        <div class="task-item d-flex justify-content-between align-items-center">
                            <div class="form-check m-0">
                                <input class="form-check-input chk-task" type="checkbox" value="Cek Gas" id="task4" onchange="catatWaktu(this, 'time4')">
                                <label class="form-check-label ms-2" for="task4">Cek Gas</label>
                            </div>
                            <span id="time4" class="time-badge">Belum</span>
                        </div>

                        <div class="task-item d-flex justify-content-between align-items-center">
                            <div class="form-check m-0">
                                <input class="form-check-input chk-task" type="checkbox" value="Cek Kebersihan" id="task5" onchange="catatWaktu(this, 'time5')">
                                <label class="form-check-label ms-2" for="task5">Cek Kebersihan</label>
                            </div>
                            <span id="time5" class="time-badge">Belum</span>
                        </div>

                        <div class="task-item d-flex justify-content-between align-items-center">
                            <div class="form-check m-0">
                                <input class="form-check-input chk-task" type="checkbox" value="Body Checking" id="task6" onchange="catatWaktu(this, 'time6')">
                                <label class="form-check-label ms-2" for="task6">Body Checking</label>
                            </div>
                            <span id="time6" class="time-badge">Belum</span>
                        </div>

                    </div>

                    <button type="submit" class="btn btn-guard shadow-sm mt-3" id="btnKirim">
                        <i class="fa-solid fa-paper-plane me-1"></i> Kirim Laporan Tugas Security
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDeOduyu626TZ9CR0JGvzBH0qJAoArT8rk",
        authDomain: "sppgbangunsari02-b5cb1.firebaseapp.com",
        projectId: "sppgbangunsari02-b5cb1",
        storageBucket: "sppgbangunsari02-b5cb1.firebasestorage.app",
        messagingSenderId: "497486447370",
        appId: "1:497486447370:web:0b2b6ce4297b48d18b70f3",
        measurementId: "G-TE7G4NTT96"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let jumlahTugasKustom = 0;

    // FUNGSI UNTUK MENAMBAH BARIS TULIS TUGAS LAIN SECARA DINAMIS
    function tambahTugasKustom() {
        jumlahTugasKustom++;
        const idUnik = "kustom_" + jumlahTugasKustom;
        const targetSpanId = "time_kustom_" + jumlahTugasKustom;
        
        const itemHTML = `
            <div class="task-item bg-light border-primary" id="box_${idUnik}">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <span class="badge bg-primary small">Tugas Tambahan Sendiri</span>
                    <button type="button" class="btn text-danger p-0 border-0 btn-sm" onclick="hapusTugasKustom('${idUnik}')"><i class="fa-solid fa-trash-can"></i></button>
                </div>
                <input type="text" class="form-control mb-2 input-nama-kustom" placeholder="Tulis nama kegiatan/tugas di sini..." oninput="syncValueCheckbox('${idUnik}', this.value)" required>
                <div class="d-flex justify-content-between align-items-center mt-2">
                    <div class="form-check m-0">
                        <input class="form-check-input chk-task" type="checkbox" value="" id="${idUnik}" onchange="catatWaktu(this, '${targetSpanId}')">
                        <label class="form-check-label ms-2 fw-semibold text-success" for="${idUnik}">Selesai Dikerjakan</label>
                    </div>
                    <span id="${targetSpanId}" class="time-badge">Belum</span>
                </div>
            </div>
        `;
        
        document.getElementById('containerDaftarTugas').insertAdjacentHTML('beforeend', itemHTML);
    }

    // Menyelaraskan teks ketikan ke nilai value checkbox kustom
    function syncValueCheckbox(idCheckbox, teks) {
        document.getElementById(idCheckbox).value = "Tambahan: " + teks;
    }

    // Fungsi hapus baris kustom jika salah tulis sebelum dikirim
    function hapusTugasKustom(idElement) {
        document.getElementById("box_" + idElement).remove();
    }

    // Mencatat jam saat checkbox disentuh/dicentang
    function catatWaktu(checkbox, targetSpanId) {
        const targetSpan = document.getElementById(targetSpanId);
        if (checkbox.checked) {
            const sekarang = new Date();
            const jam = sekarang.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', hour12: false }) + " WIB";
            targetSpan.innerText = jam;
            targetSpan.style.backgroundColor = "#d1fae5";
            targetSpan.style.color = "#065f46";
        } else {
            targetSpan.innerText = "Belum";
            targetSpan.style.backgroundColor = "#e2e8f0";
            targetSpan.style.color = "#475569";
        }
    }

    // Kirim Laporan Checklist ke Firebase
    document.getElementById('formChecklist').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('btnKirim');
        const namaSecurity = document.getElementById('namaSecurity').value;
        
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-1"></i> Menyimpan Laporan...';
        btn.disabled = true;

        const detailTugas = [];
        const chkTasks = document.querySelectorAll('.chk-task');
        
        chkTasks.forEach((chk) => {
            // Mencari elemen penunjuk waktu di struktur induknya masing-masing
            const parentBox = chk.closest('.task-item');
            const targetSpan = parentBox.querySelector('.time-badge');
            const jamSelesai = targetSpan.innerText;
            
            // Validasi proteksi: Jika ada kolom ketikan tugas kosong, tolak.
            if(chk.value.trim() === "" || chk.value === "Tambahan: ") {
                return; 
            }

            detailTugas.push({
                nama_tugas: chk.value,
                selesai: chk.checked,
                jam_selesai: chk.checked ? jamSelesai : "-"
            });
        });

        if(detailTugas.length === 0) {
            alert("Mohon isi minimal satu nama tugas tambahan!");
            btn.innerHTML = '<i class="fa-solid fa-paper-plane me-1"></i> Kirim Laporan Tugas Security';
            btn.disabled = false;
            return;
        }

        const hariIni = new Date();
        const stringTanggal = hariIni.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });

        db.collection("security_tasks").add({
            nama_security: namaSecurity,
            tanggal: stringTanggal,
            tugas: detailTugas,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        })
        .then(() => {
            alert("Laporan checklist Security berhasil dikirim ke Admin!");
            window.location.reload();
        })
        .catch((error) => {
            alert("Gagal mengirim laporan: " + error.message);
            btn.innerHTML = '<i class="fa-solid fa-paper-plane me-1"></i> Kirim Laporan Tugas Security';
            btn.disabled = false;
        });
    });

    document.getElementById('btnLogout').addEventListener('click', function() {
        firebase.auth().signOut().then(() => { window.location.href = "login.html"; });
    });
</script>
</body>
</html>
