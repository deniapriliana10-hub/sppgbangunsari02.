<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Panel - SPPG BANGUNSARI 02</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-blue: #1e6091;
            --secondary-blue: #1a75ff;
            --light-bg: #f4f7fa;
            --card-border: rgba(30, 96, 145, 0.1);
        }
        body { 
            background-color: var(--light-bg); 
            color: #334155;
            font-family: 'Urbanist', sans-serif;
            padding-bottom: 60px;
        }
        .navbar-driver { 
            background: linear-gradient(135deg, var(--primary-blue), #164e63); 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .panel-title {
            border-left: 5px solid var(--secondary-blue);
            padding-left: 15px;
            margin: 30px 0;
        }
        .card-sekolah { 
            border: 1px solid var(--card-border); 
            border-radius: 16px; 
            background-color: #ffffff;
            box-shadow: 0 10px 25px rgba(30, 96, 145, 0.04); 
            transition: transform 0.3s ease, box-shadow 0.3s ease; 
        }
        .card-sekolah:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(30, 96, 145, 0.08);
        }
        .preview-container {
            background-color: #f8fafc;
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            display: none;
            margin-top: 15px;
        }
        .preview-img { 
            max-height: 180px; 
            border-radius: 8px; 
            object-fit: cover;
        }
        .badge-status {
            font-weight: 700;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 13px;
        }
        .btn-action {
            border-radius: 12px;
            padding: 12px;
            font-weight: 700;
            transition: all 0.2s ease;
        }
        .file-upload-wrapper {
            position: relative;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-driver py-3">
    <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="#">
            <i class="fa-solid fa-truck-fast"></i> SPPG LOGISTIK
        </a>
        <button class="btn btn-outline-light btn-sm fw-bold px-3 rounded-pill" id="btnLogout">
            <i class="fa-solid fa-right-from-bracket me-1"></i> Keluar
        </button>
    </div>
</nav>

<div class="container">
    <div class="panel-title">
        <h2 class="fw-bold text-dark mb-1">Daftar Distribusi Hari Ini</h2>
        <p class="text-secondary mb-0">Silakan perbarui status pengiriman secara berkala tepat di lokasi tujuan.</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div id="daftarSekolahDriver" class="row g-4">
                <div class="col-12 text-center py-5">
                    <div class="spinner-border text-primary mb-3" role="status"></div>
                    <p class="text-muted">Menghubungkan ke sistem manajemen logistik...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDeOduyu626TZ9CR0JGvzBH0qJAoArT8rk",
        authDomain: "sppgbangunsari02-b5cb1.firebaseapp.com",
        projectId: "sppgbangunsari02-b5cb1",
        storageBucket: "sppgbangunsari02-b5cb1.firebasestorage.app",
        messagingSenderId: "497486447370",
        appId: "1:497486447370:web:0b2b6ce4297b48d18b70f3",
        measurementId: "G-TE7G4NTT96"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const appsScriptUrl = "https://script.google.com/macros/s/AKfycbyAbI0lG6EYWt2bjhZfRolxRKr1eF4nk5o8CxC65sc_2sDzTd-JA40JG0QicSJ6SOvz-w/exec";
    
    let gambarBase64Temp = {};
    let prosesGambar;
    let updateStatusSampai;

    firebase.auth().onAuthStateChanged((user) => {
        if (!user) {
            alert("Akses Ditolak! Silakan login untuk membuat laporan.");
            window.location.href = "login.html";
        } else {
            jalankanAplikasiLapor();
        }
    });

    function jalankanAplikasiLapor() {
        db.collection("sekolah_list").onSnapshot((querySnapshot) => {
            const container = document.getElementById('daftarSekolahDriver');
            container.innerHTML = "";

            if (querySnapshot.empty) {
                container.innerHTML = `
                    <div class="col-12 text-center text-muted py-5 card card-sekolah">
                        <i class="fa-solid fa-clipboard-check fa-3x mb-3 text-disabled" style="opacity: 0.3;"></i>
                        <p class="fw-semibold mb-0">Belum ada rute pengiriman yang ditugaskan hari ini.</p>
                    </div>`;
                return;
            }

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const idDoc = doc.id;
                const isSelesai = data.status === "Sudah Sampai";

                let bagianAksi = "";
                if (!isSelesai) {
                    bagianAksi = `
                        <div class="file-upload-wrapper">
                            <label class="form-label small fw-bold text-secondary"><i class="fa-solid fa-camera me-1"></i> Ambil Foto Dokumentasi / Bukti:</label>
                            <input type="file" accept="image/*" capture="environment" onchange="prosesGambar(this, '${idDoc}')" class="form-control form-control-lg bg-light" style="font-size: 15px;">
                            <div id="container-prev-${idDoc}" class="preview-container">
                                <img id="prev-${idDoc}" class="preview-img img-fluid">
                            </div>
                        </div>
                        <button class="btn btn-primary btn-action w-100 shadow-sm" id="btn-${idDoc}" onclick="updateStatusSampai('${idDoc}')">
                            <i class="fa-solid fa-circle-check me-1"></i> Konfirmasi Sampai di Lokasi
                        </button>
                    `;
                } else {
                    bagianAksi = `
                        <div class="alert alert-success d-flex align-items-center justify-content-center gap-2 mb-0 border-0 fw-bold py-3" style="border-radius: 12px; background-color: #e8f5e9; color: #2e7d32;">
                            <i class="fa-solid fa-square-check fa-lg"></i> Distribusi Selesai (${data.waktu_tiba || ''})
                        </div>
                    `;
                }

                const cardHTML = `
                    <div class="col-12">
                        <div class="card card-sekolah p-4">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <div>
                                    <span class="text-uppercase tracking-wider text-muted small fw-bold d-block mb-1">Tujuan Pengiriman</span>
                                    <h4 class="fw-bold text-dark mb-0">${data.nama || "Nama Sekolah"}</h4>
                                </div>
                                <span class="badge badge-status ${isSelesai ? 'bg-success text-white' : 'bg-warning text-dark'}">
                                    <i class="fa-solid ${isSelesai ? 'fa-check-double' : 'fa-truck-moving'} me-1"></i> ${data.status || 'Dalam Perjalanan'}
                                </span>
                            </div>
                            <hr class="my-3" style="border-color: var(--card-border);">
                            ${bagianAksi}
                        </div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        });

        prosesGambar = function(input, idDoc) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');

                        const MAX_WIDTH = 800;
                        let width = img.width;
                        let height = img.height;

                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }

                        canvas.width = width;
                        canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);

                        const dataUrlKompres = canvas.toDataURL('image/jpeg', 0.7);
                        gambarBase64Temp[idDoc] = dataUrlKompres;

                        const containerPrev = document.getElementById(`container-prev-${idDoc}`);
                        const preview = document.getElementById(`prev-${idDoc}`);
                        if(preview && containerPrev) {
                            preview.src = dataUrlKompres;
                            containerPrev.style.display = "block";
                        }
                    }
                }
                reader.readAsDataURL(file);
            }
        }

        updateStatusSampai = function(idDokumen) {
            if (!gambarBase64Temp[idDokumen]) {
                alert("Harap lampirkan atau ambil foto bukti serah terima terlebih dahulu!");
                return;
            }

            if(confirm("Apakah Anda yakin ingin menyelesaikan tugas pengiriman pada sekolah ini?")) {
                const btn = document.getElementById(`btn-${idDokumen}`);
                const teksAwal = btn.innerHTML;
                
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-1"></i> Memproses Laporan...';
                btn.classList.add("disabled");

                db.collection("sekolah_list").doc(idDokumen).get().then((docSnap) => {
                    const namaSekolah = docSnap.data().nama || "Sekolah";

                    // Mengirim data ke Google Drive menggunakan mekanisme bypass eror (.catch)
                    return fetch(appsScriptUrl, {
                        method: "POST",
                        body: JSON.stringify({
                            divisi: namaSekolah,
                            image: gambarBase64Temp[idDokumen]
                        })
                    })
                    .then(res => res.json())
                    .then(resData => {
                        return resData.status === "success" ? resData.url : "Gagal upload Google Drive";
                    })
                    .catch(() => {
                        // JIKA GOOGLE DRIVE TOLAK/EROR, OTOMATIS LOGIN BERLANJUT & LINK DIISI STRIP (-)
                        return "-"; 
                    });
                })
                .then((urlAman) => {
                    // PENGUNCIAN: Apapun hasil Google Drive (Sukses/Gagal), Firebase WAJIB dipaksa update sukses!
                    const sekarang = new Date();
                    const opsiWaktu = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
                    const stringWaktu = sekarang.toLocaleTimeString('id-ID', opsiWaktu) + " WIB";

                    return db.collection("sekolah_list").doc(idDokumen).update({
                        status: "Sudah Sampai",
                        foto_bukti: urlAman,
                        waktu_tiba: stringWaktu
                    });
                })
                .then(() => {
                    alert("Sukses! Laporan pengiriman berhasil dikonfirmasi.");
                })
                .catch((err) => {
                    alert("Firebase Database Menolak Akses: " + err.message);
                    btn.innerHTML = teksAwal;
                    btn.classList.remove("disabled");
                });
            }
        }
    }

    document.getElementById('btnLogout').addEventListener('click', function() {
        firebase.auth().signOut().then(() => { 
            window.location.href = "login.html"; 
        }).catch((error) => {
            alert("Gagal keluar: " + error.message);
        });
    });
</script>
</body>
</html>
