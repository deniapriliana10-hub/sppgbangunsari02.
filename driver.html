<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Panel - SPPG BANGUNSARI 02</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar-driver { background: linear-gradient(90deg, #1E88E5, #1565C0); }
        .card-sekolah { border: none; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.3s; }
        .preview-img { max-height: 150px; display: none; border-radius: 10px; margin-top: 10px; box-shadow: 0 3px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-driver mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">🚚 DRIVER SPPG</a>
        <button class="btn btn-light btn-sm ms-auto" id="btnLogout">Logout</button>
    </div>
</nav>

<div class="container pb-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h4 class="fw-bold text-secondary mb-3">Daftar Pengiriman Hari Ini</h4>
            <p class="text-muted small">Silakan ambil foto bukti di lokasi sekolah tujuan sebelum melakukan konfirmasi selesai.</p>
            <hr>

            <div id="daftarSekolahDriver" class="row g-3">
                <div class="col-12 text-center text-muted py-4">
                    Menghubungkan ke satelit logistik...
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDeOduyu626TZ9CR0JGvzBH0qJAoArT8rk",
        authDomain: "sppgbangunsari02-b5cb1.firebaseapp.com",
        projectId: "sppgbangunsari02-b5cb1",
        storageBucket: "sppgbangunsari02-b5cb1.firebasestorage.app",
        messagingSenderId: "497486447370",
        appId: "1:497486447370:web:0b2b6ce4297b48d18b70f3",
        measurementId: "G-TE7G4NTT96"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // URL Apps Script Jembatan Google Drive milikmu
    const appsScriptUrl = "https://script.google.com/macros/s/AKfycbwLgcPFVU_7uYLiTUbdld7CtvRcCeg576olUz2UaWgogkaPEfasL5BdJGsuTv7WX3Bg/exec";

    // Penampung data gambar sementara sebelum dikirim
    let gambarBase64Temp = {};

    // Ambil daftar sekolah secara Real-time dari Firebase
    db.collection("sekolah_list").onSnapshot((querySnapshot) => {
        const container = document.getElementById('daftarSekolahDriver');
        container.innerHTML = "";

        if (querySnapshot.empty) {
            container.innerHTML = `<div class="col-12 text-center text-muted py-3">Belum ada tugas pengiriman sekolah hari ini.</div>`;
            return;
        }

        querySnapshot.forEach((doc) => {
            const data = doc.data();
            const idDoc = doc.id;

            let bagianAksi = "";

            // Jika status masih dalam perjalanan, tampilkan tombol upload & konfirmasi
            if (data.status !== "Sudah Sampai") {
                bagianAksi = `
                    <div class="mb-3">
                        <label class="form-label small fw-semibold text-muted">Ambil Foto Bukti Serah Terima:</label>
                        <input type="file" accept="image/*" capture="environment" onchange="prosesGambar(this, '${idDoc}')" class="form-control form-control-sm">
                        <img id="prev-${idDoc}" class="preview-img img-fluid">
                    </div>
                    <button class="btn btn-success w-100 fw-bold" id="btn-${idDoc}" onclick="updateStatusSampai('${idDoc}')">
                        ✓ Konfirmasi Sampai
                    </button>
                `;
            } else {
                // Jika sudah sampai, kunci tombolnya agar driver tidak salah pencet lagi
                bagianAksi = `
                    <div class="alert alert-success text-center mb-0 fw-bold rounded-3 py-2">
                        ✓ Selesai Terkirim
                    </div>
                `;
            }

            const cardHTML = `
                <div class="col-12">
                    <div class="card card-sekolah p-4 bg-white">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="fw-bold mb-0 text-dark">${data.nama || "Nama Sekolah"}</h5>
                            <span class="badge ${data.status === 'Sudah Sampai' ? 'bg-success' : 'bg-warning text-dark'} px-3 py-2 rounded-pill small">
                                ${data.status || 'Dalam Perjalanan'}
                            </span>
                        </div>
                        <hr class="mt-0">
                        ${bagianAksi}
                    </div>
                </div>
            `;
            container.innerHTML += cardHTML;
        });
    });

    // Fungsi memproses kamera/file foto dan mengubahnya ke Base64 (Teks) sementara
    function prosesGambar(input, idDoc) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                gambarBase64Temp[idDoc] = e.target.result; // Simpan di memori sementara
                const preview = document.getElementById(`prev-${idDoc}`);
                preview.src = e.target.result;
                preview.style.display = "block"; // Munculkan preview foto di layar driver
            }
            reader.readAsDataURL(file);
        }
    }

    // Fungsi mengirim gambar ke Google Drive lalu update status di Firebase
    function updateStatusSampai(idDokumen) {
        if (!gambarBase64Temp[idDokumen]) {
            alert("Wajib mengambil atau mengunggah foto bukti kiriman terlebih dahulu!");
            return;
        }

        if(confirm("Konfirmasi bahwa paket makanan telah tiba di lokasi sekolah tujuan?")) {
            const btn = document.getElementById(`btn-${idDokumen}`);
            const teksAwal = btn.innerText;
            
            btn.innerText = "⏳ Mengunggah ke Google Drive...";
            btn.classList.add("disabled");

            // Ambil nama sekolah untuk nama file gambar di Drive nanti
            db.collection("sekolah_list").doc(idDokumen).get().then((docSnap) => {
                const namaSekolah = docSnap.data().nama || "Sekolah";

                // Tembak data gambar ke Google Apps Script Jembatan Drive
                return fetch(appsScriptUrl, {
                    method: "POST",
                    body: JSON.stringify({
                        nama_sekolah: namaSekolah,
                        gambar: gambarBase64Temp[idDokumen]
                    })
                });
            })
            .then(response => response.json())
            .then(result => {
                if (result.status === "success") {
                    // Jika sukses tersimpan di Google Drive, simpan LINK URL Drive-nya ke Firebase
                    return db.collection("sekolah_list").doc(idDokumen).update({
                        status: "Sudah Sampai",
                        foto_bukti: result.url 
                    });
                } else {
                    throw new Error(result.message);
                }
            })
            .then(() => {
                alert("Laporan sukses dikirim! Foto tersimpan aman di Google Drive Admin.");
            })
            .catch((err) => {
                alert("Gagal memproses laporan: " + err.message);
                btn.innerText = teksAwal;
                btn.classList.remove("disabled");
            });
        }
    }

    // Fungsi Logout Driver
    document.getElementById('btnLogout').addEventListener('click', function() {
        firebase.auth().signOut().then(() => { window.location.href = "login.html"; });
    });
</script>

</body>
</html>
