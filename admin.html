<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Dashboard - SPPG Bangunsari 02</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --bg-dark: #0f172a; --card-bg: #1e293b; --neon-lime: #deff9a; }
        body { background-color: var(--bg-dark); color: #ffffff; font-family: 'Urbanist', sans-serif; padding-bottom: 50px; }
        .header-title { border-left: 5px solid var(--neon-lime); padding-left: 15px; margin: 40px 0; }
        .card-divisi { background-color: var(--card-bg); border: 1px solid rgba(222, 255, 154, 0.1); border-radius: 15px; padding: 25px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .table { color: #f1f5f9; vertical-align: middle; }
        .table thead th { background-color: rgba(222, 255, 154, 0.05); color: var(--neon-lime); text-transform: uppercase; font-size: 12px; letter-spacing: 1px; border: none; }
        .badge-status { font-size: 11px; padding: 5px 12px; border-radius: 20px; font-weight: 700; }
        .btn-view { color: var(--neon-lime); text-decoration: none; font-weight: 600; font-size: 14px; }
        .section-icon { margin-right: 10px; color: var(--neon-lime); }
    </style>
</head>
<body>

<div class="container">
    <div class="header-title">
        <h1 class="fw-bold">OPERATIONAL <span style="color: var(--neon-lime);">CONTROL</span></h1>
        <p class="text-secondary">SPPG Bangunsari 02 - Real-Time Executive Monitoring</p>
    </div>

    <div class="card-divisi">
        <h4 class="fw-bold mb-4"><i class="fa-solid fa-boxes-packing section-icon"></i> Tim Persiapan</h4>
        <table class="table"><tbody id="persiapanTable"></tbody></table>
    </div>

    <div class="card-divisi">
        <h4 class="fw-bold mb-4"><i class="fa-solid fa-fire-burner section-icon"></i> Tim Pengolahan</h4>
        <table class="table"><tbody id="pengolahanTable"></tbody></table>
    </div>

    <div class="card-divisi">
        <h4 class="fw-bold mb-4"><i class="fa-solid fa-truck-ramp-box section-icon"></i> Status Distribusi</h4>
        <table class="table"><tbody id="sekolahTable"></tbody></table>
    </div>

    <button class="btn btn-danger w-100 fw-bold py-3" id="btnResetAll" style="border-radius: 12px;">
        <i class="fa-solid fa-rotate"></i> RESET SEMUA DATA HARI INI
    </button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDeOduyu626TZ9CR0JGvzBH0qJAoArT8rk",
        authDomain: "sppgbangunsari02-b5cb1.firebaseapp.com",
        projectId: "sppgbangunsari02-b5cb1",
        storageBucket: "sppgbangunsari02-b5cb1.firebasestorage.app",
        messagingSenderId: "497486447370",
        appId: "1:497486447370:web:0b2b6ce4297b48d18b70f3"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Fungsi Render Dinamis
    function syncTable(colName, queryField, queryVal, tableId) {
        let ref = db.collection(colName);
        if(queryField) ref = ref.where(queryField, "==", queryVal);
        
        ref.onSnapshot(snapshot => {
            const tbody = document.getElementById(tableId);
            tbody.innerHTML = "";
            snapshot.forEach(doc => {
                const d = doc.data();
                tbody.innerHTML += `<tr>
                    <td>${d.nama_anggota || d.nama || '-'}</td>
                    <td>${d.jam_masuk || d.status || '-'}</td>
                    <td>${d.foto_kegiatan || d.foto_bukti ? `<a href="${d.foto_kegiatan || d.foto_bukti}" target="_blank" class="btn-view">Lihat Bukti</a>` : '-'}</td>
                </tr>`;
            });
        });
    }

    syncTable("divisi_status", "nama_divisi", "Persiapan", "persiapanTable");
    syncTable("divisi_status", "nama_divisi", "Pengolahan", "pengolahanTable");
    syncTable("sekolah_list", null, null, "sekolahTable");

    // Fungsi Reset Data
    document.getElementById('btnResetAll').addEventListener('click', async () => {
        if (!confirm("Hapus semua data laporan hari ini?")) return;
        
        const collections = ["divisi_status", "sekolah_list"];
        for (const col of collections) {
            const snapshot = await db.collection(col).get();
            const batch = db.batch();
            snapshot.forEach(doc => batch.delete(doc.ref));
            await batch.commit();
        }
        alert("Data berhasil di-reset!");
        location.reload();
    });
</script>
</body>
</html>
