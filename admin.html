<div class="card p-4 mb-4 shadow-sm border-0">
    <h4 class="fw-bold text-primary">🛡️ Tim Persiapan</h4>
    <div class="table-responsive">
        <table class="table table-bordered">
            <thead class="table-light">
                <tr><th>Nama Anggota</th><th>Jam Masuk</th><th>Status</th><th>Jam Pulang</th><th>Foto Kegiatan</th></tr>
            </thead>
            <tbody id="divisiPersiapanBody">
                </tbody>
        </table>
    </div>
</div>

<div class="card p-4 mb-4 shadow-sm border-0">
    <h4 class="fw-bold text-success">🍳 Tim Pengolahan</h4>
    <div class="table-responsive">
        <table class="table table-bordered">
            <tbody id="divisiPengolahanBody"></tbody>
        </table>
    </div>
</div>

<div class="card p-4 bg-dark text-white shadow-sm">
    <h4 class="fw-bold">🚚 Status Pengiriman Sekolah</h4>
    <table class="table table-dark table-hover">
        <thead><tr><th>Sekolah</th><th>Status</th><th>Bukti</th></tr></thead>
        <tbody id="monitoringTableBody"></tbody>
    </table>
    <button class="btn btn-danger w-100" id="btnResetStatus">🔄 RESET SEMUA DATA (HARI INI)</button>
</div>

<script>
    // Contoh pengambilan data per divisi
    db.collection("divisi_status").where("nama_divisi", "==", "Persiapan").onSnapshot(snapshot => {
        const body = document.getElementById('divisiPersiapanBody');
        body.innerHTML = "";
        snapshot.forEach(doc => {
            const d = doc.data();
            body.innerHTML += `<tr>
                <td>${d.nama_anggota || '-'}</td>
                <td>${d.jam_masuk || '-'}</td>
                <td><span class="badge ${d.status === 'Hadir' ? 'bg-success' : 'bg-danger'}">${d.status}</span></td>
                <td>${d.jam_pulang || '-'}</td>
                <td>${d.foto_kegiatan ? `<a href="${d.foto_kegiatan}" target="_blank">Lihat</a>` : '-'}</td>
            </tr>`;
        });
    });
</script>
