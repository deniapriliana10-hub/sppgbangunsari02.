<div class="card card-custom p-4 bg-white mt-4">
    <h4 class="fw-bold text-dark mb-4">📋 Laporan Alur Kerja Divisi</h4>
    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead class="table-light">
                <tr>
                    <th>Sekolah</th>
                    <th>Persiapan</th>
                    <th>Cuci</th>
                    <th>Olahan</th>
                    <th>Porsi</th>
                    <th>Driver/Foto</th>
                </tr>
            </thead>
            <tbody id="monitoringTableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    // Script untuk mengambil dan menampilkan data ke tabel
    db.collection("sekolah_list").onSnapshot((querySnapshot) => {
        const tableBody = document.getElementById('monitoringTableBody');
        tableBody.innerHTML = "";

        querySnapshot.forEach((doc) => {
            const data = doc.data();
            const row = `
                <tr>
                    <td class="fw-bold">${data.nama}</td>
                    <td><span class="badge bg-light text-dark">${data.waktu_persiapan || '-'}</span></td>
                    <td><span class="badge bg-light text-dark">${data.waktu_cuci || '-'}</span></td>
                    <td><span class="badge bg-light text-dark">${data.waktu_pengolahan || '-'}</span></td>
                    <td><span class="badge bg-light text-dark">${data.waktu_pemorsian || '-'}</span></td>
                    <td>
                        ${data.foto_bukti ? `<a href="${data.foto_bukti}" target="_blank" class="btn btn-sm btn-info">📷 Lihat</a>` : 'Belum'}
                    </td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });
    });
</script>
