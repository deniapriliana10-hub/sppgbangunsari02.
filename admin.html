<div class="card card-custom p-4 bg-white mb-4">
    <h4 class="fw-bold text-dark mb-3">🚚 Monitoring Pengiriman (Driver)</h4>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead><tr><th>Sekolah</th><th>Status</th><th>Bukti Foto</th></tr></thead>
            <tbody id="monitoringDriverBody"></tbody>
        </table>
    </div>
</div>

<div class="card card-custom p-4 bg-white">
    <h4 class="fw-bold text-dark mb-3">⚙️ Monitoring Alur Kerja Divisi</h4>
    <div class="table-responsive">
        <table class="table table-bordered">
            <thead class="table-light">
                <tr>
                    <th>Sekolah</th>
                    <th>Persiapan</th>
                    <th>Cuci Ompreng</th>
                    <th>Pengolahan</th>
                    <th>Pemorsian</th>
                </tr>
            </thead>
            <tbody id="monitoringDivisiBody"></tbody>
        </table>
    </div>
    <button class="btn btn-danger w-100 mt-4" id="btnResetStatus">🔄 RESET SEMUA DATA (PENGIRIMAN & DIVISI)</button>
</div>

<script>
    db.collection("sekolah_list").onSnapshot((snapshot) => {
        const driverBody = document.getElementById('monitoringDriverBody');
        const divisiBody = document.getElementById('monitoringDivisiBody');
        
        driverBody.innerHTML = "";
        divisiBody.innerHTML = "";

        snapshot.forEach((doc) => {
            const data = doc.data();
            
            // Mengisi Tabel Pengiriman (Driver)
            driverBody.innerHTML += `<tr>
                <td>${data.nama}</td>
                <td><span class="badge ${data.status === 'Sudah Sampai' ? 'bg-success' : 'bg-warning'}">${data.status}</span></td>
                <td>${data.foto_bukti ? `<a href="${data.foto_bukti}" target="_blank" class="btn btn-sm btn-info">📷 Lihat</a>` : '-'}</td>
            </tr>`;

            // Mengisi Tabel Divisi (Persiapan, Cuci, dll)
            divisiBody.innerHTML += `<tr>
                <td class="fw-bold">${data.nama}</td>
                <td>${data.waktu_persiapan || '-'}</td>
                <td>${data.waktu_cuci || '-'}</td>
                <td>${data.waktu_pengolahan || '-'}</td>
                <td>${data.waktu_pemorsian || '-'}</td>
            </tr>`;
        });
    });
</script>
