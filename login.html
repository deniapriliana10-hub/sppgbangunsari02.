<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SPPG Bangunsari 02 | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center" style="height: 100vh;">

<div class="card p-4 shadow" style="width: 350px;">
    <h3 class="text-center mb-4">Login Akun</h3>
    <input type="email" id="email" class="form-control mb-3" placeholder="Email">
    <input type="password" id="pass" class="form-control mb-3" placeholder="Password">
    <button onclick="login()" class="btn btn-primary w-100">MASUK</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = { /* MASUKKAN KODE CONFIG FIREBASE KAMU */ };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function login() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;

        firebase.auth().signInWithEmailAndPassword(email, pass).then((user) => {
            // Cek ke database siapa user ini berdasarkan email
            db.collection("users").doc(user.user.uid).get().then((doc) => {
                const role = doc.data().role; // Misal: 'admin', 'driver', atau 'tim'
                
                if (role === 'admin') window.location.href = "admin.html";
                else if (role === 'driver') window.location.href = "driver.html";
                else window.location.href = "lapor.html";
            });
        }).catch(err => alert("Login Gagal: " + err.message));
    }
</script>
</body>
</html>
