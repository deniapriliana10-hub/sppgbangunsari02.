<!DOCTYPE html>
<html>
<body>
    <h2>Login Test</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="pass" placeholder="Password">
    <button id="btnMasuk">MASUK</button>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
        alert("Skrip sudah terbaca!"); // Kalau ini muncul saat di-refresh, artinya skrip sudah jalan.

        const firebaseConfig = {
            // PASTI KAN CONFIG DI SINI SUDAH BENAR
            apiKey: "AIzaSy...", 
            authDomain: "...",
            projectId: "...",
            storageBucket: "...",
            messagingSenderId: "...",
            appId: "..."
        };
        firebase.initializeApp(firebaseConfig);

        document.getElementById("btnMasuk").addEventListener("click", function() {
            const email = document.getElementById("email").value;
            const pass = document.getElementById("pass").value;

            firebase.auth().signInWithEmailAndPassword(email, pass)
            .then(() => {
                alert("Login Berhasil!");
            })
            .catch((error) => {
                alert("Error: " + error.message);
            });
        });
    </script>
</body>
</html>
