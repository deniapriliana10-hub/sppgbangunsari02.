<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Operasional SPPG Bangunsari 02 - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #007bff;
            --light-blue: #e3f2fd;
        }
        body {
            background-color: var(--light-blue);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-container {
            background-color: #fff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 123, 255, 0.1);
            width: 100%;
            max-width: 400px;
            border-top: 5px solid var(--primary-blue);
        }
        .login-container h3 {
            color: var(--primary-blue);
            font-weight: 700;
            text-transform: uppercase;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(0, 123, 255, 0.15);
            border-color: var(--primary-blue);
        }
        .btn-primary {
            background-color: var(--primary-blue);
            border: none;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="login-container">
    <h3 class="text-center mb-4">SPPG Bangunsari</h3>
    <div id="alertMessage" class="alert alert-danger d-none"></div>
    
    <div class="mb-3">
        <label for="email" class="form-label">Email Operasional</label>
        <input type="email" id="email" class="form-control form-control-lg" placeholder="contoh@sppg.com">
    </div>
    <div class="mb-4">
        <label for="pass" class="form-label">Password</label>
        <input type="password" id="pass" class="form-control form-control-lg" placeholder="Masukkan password">
    </div>
    
    <button id="btnMasuk" class="btn btn-primary btn-lg w-100 mb-3">MASUK KE SISTEM</button>
    <p class="text-center text-muted small">© 2026 PT. Persiapan Persatuan Giling</p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Konfigurasi Firebase Anda
    const firebaseConfig = {
        apiKey: "AIzaSyDeOduyu626TZ9CR0JGvzBH0qJAoArT8rk",
        authDomain: "sppgbangunsari02-b5cb1.firebaseapp.com",
        projectId: "sppgbangunsari02-b5cb1",
        storageBucket: "sppgbangunsari02-b5cb1.firebasestorage.app",
        messagingSenderId: "497486447370",
        appId: "1:497486447370:web:0b2b6ce4297b48d18b70f3",
        measurementId: "G-TE7G4NTT96"
    };

    // Inisialisasi
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Variabel untuk elemen UI
    const btnMasuk = document.getElementById("btnMasuk");
    const alertMessage = document.getElementById("alertMessage");

    // Fungsi untuk menampilkan error
    const showError = (message) => {
        alertMessage.textContent = message;
        alertMessage.classList.remove("d-none");
        btnMasuk.textContent = "COBA LAGI";
        btnMasuk.removeAttribute("disabled");
    };

    // Event Listener pada tombol Masuk
    btnMasuk.addEventListener("click", async () => {
        const email = document.getElementById("email").value;
        const pass = document.getElementById("pass").value;

        // Reset status alert dan tombol
        alertMessage.classList.add("d-none");
        btnMasuk.textContent = "SEDANG MEMPROSES...";
        btnMasuk.setAttribute("disabled", "true");

        if (!email || !pass) {
            showError("Email dan Password wajib diisi!");
            return;
        }

        try {
            // 1. Melakukan Autentikasi
            const userCredential = await signInWithEmailAndPassword(auth, email, pass);
            const user = userCredential.user;

            // 2. Mengambil Role dari Firestore
            const docRef = doc(db, "users", user.uid);
            const docSnap = await getDoc(docRef);

            // 3. Mengarahkan Halaman Berdasarkan Role
            if (docSnap.exists()) {
                const role = docSnap.data().role;
                if (role === "admin") window.location.href = "admin.html";
                else if (role === "driver") window.location.href = "driver.html";
                else window.location.href = "lapor.html"; // Untuk divisi
            } else {
                showError("Error: Akun belum terdaftar di database 'users'! (UID salah)");
            }
        } catch (error) {
            let message = "Masalah koneksi, coba lagi.";
            if (error.code === "auth/wrong-password" || error.code === "auth/user-not-found") {
                message = "Email atau Password salah.";
            } else if (error.code === "auth/network-request-failed") {
                message = "Koneksi internet Anda bermasalah.";
            }
            showError(message);
        }
    });
</script>

</body>
</html>
