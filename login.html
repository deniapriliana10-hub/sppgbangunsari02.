<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Sistem - SPPG BANGUNSARI 02</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2196F3;
            --secondary: #64B5F6;
            --light: #F5FAFF;
        }
        body {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-login {
            border: none;
            border-radius: 20px;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        .btn-login {
            background: var(--primary);
            color: white;
            font-weight: bold;
        }
        .btn-login:hover {
            background: #1976D2;
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card card-login p-5">
                <div class="text-center mb-4">
                    <h3 class="fw-bold text-primary">PORTAL LOGIN</h3>
                    <p class="text-muted">Satu pintu untuk Admin & Driver</p>
                </div>
                
                <form id="loginForm">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Akun</label>
                        <input type="email" class="form-control" id="email" required placeholder="nama@email.com">
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" required placeholder="Masukkan password">
                    </div>
                    <button type="submit" class="btn btn-login w-100 py-2 mb-3">Masuk Ke Sistem</button>
                    <div class="text-center">
                        <a href="index.html" class="text-decoration-none text-muted small">← Kembali ke Beranda</a>
                    </div>
                </form>
                
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<script>
    // Konfigurasi Firebase asli milikmu
    const firebaseConfig = {
        apiKey: "AIzaSyDeOduyu626TZ9CR0JGvzBH0qJAoArT8rk",
        authDomain: "sppgbangunsari02-b5cb1.firebaseapp.com",
        projectId: "sppgbangunsari02-b5cb1",
        storageBucket: "sppgbangunsari02-b5cb1.firebasestorage.app",
        messagingSenderId: "497486447370",
        appId: "1:497486447370:web:0b2b6ce4297b48d18b70f3",
        measurementId: "G-TE7G4NTT96"
    };

    // Inisialisasi Firebase
    firebase.initializeApp(firebaseConfig);

    // Deteksi Submit Form
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value.toLowerCase(); // Ambil input email (kecilkan huruf)
        const password = document.getElementById('password').value;

        // Proses autentikasi
        firebase.auth().signInWithEmailAndPassword(email, password)
            .then((userCredential) => {
                
                // LOGIKA PEMISAH RUTE (PINTU OTOMATIS)
                // Cek apakah email yang login mengandung kata 'driver'
                if (email.includes('driver')) {
                    alert("Login Berhasil! Selamat datang Driver SPPG.");
                    window.location.href = "driver.html"; // Lempar ke halaman driver
                } else {
                    alert("Login Berhasil! Selamat datang Admin SPPG.");
                    window.location.href = "admin.html"; // Jika bukan driver, lempar ke halaman admin pusat
                }

            })
            .catch((error) => {
                alert("Gagal Login: " + error.message);
            });
    });
</script>
</body>
</html>
