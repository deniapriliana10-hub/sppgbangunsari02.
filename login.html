<!DOCTYPE html>
<html>
<head>
    <title>Login - SPPG Bangunsari 02</title>
</head>
<body>
    <div style="text-align: center; margin-top: 50px;">
        <h2>Login Sistem</h2>
        <input type="email" id="email" placeholder="Email"><br>
        <input type="password" id="pass" placeholder="Password"><br><br>
        <button id="btnMasuk">MASUK</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDeOduyu626TZ9CR0JGvzBH0qJAoArT8rk",
            authDomain: "sppgbangunsari02-b5cb1.firebaseapp.com",
            projectId: "sppgbangunsari02-b5cb1",
            storageBucket: "sppgbangunsari02-b5cb1.firebasestorage.app",
            messagingSenderId: "497486447370",
            appId: "1:497486447370:web:0b2b6ce4297b48d18b70f3"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        document.getElementById("btnMasuk").addEventListener("click", () => {
            const email = document.getElementById("email").value;
            const pass = document.getElementById("pass").value;

            firebase.auth().signInWithEmailAndPassword(email, pass)
            .then((userCredential) => {
                // Ambil role dari Firestore
                db.collection("users").doc(userCredential.user.uid).get()
                .then((doc) => {
                    if (doc.exists) {
                        const role = doc.data().role;
                        if (role === "admin") window.location.href = "admin.html";
                        else if (role === "driver") window.location.href = "driver.html";
                        else window.location.href = "lapor.html";
                    } else {
                        alert("User tidak terdaftar di database!");
                    }
                });
            })
            .catch((error) => {
                alert("Login Gagal: " + error.message);
            });
        });
    </script>
</body>
</html>
