<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login - SPPG Bangunsari 02</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card p-4 shadow" style="width: 350px;">
        <h3 class="text-center mb-4">SPPG Login</h3>
        <input type="email" id="email" class="form-control mb-3" placeholder="Email">
        <input type="password" id="pass" class="form-control mb-3" placeholder="Password">
        <button id="btnMasuk" class="btn btn-primary w-100">MASUK</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            // ISI CONFIG KAMU DI SINI
            apiKey: "AIzaSyDeOduyu626TZ9CR0JGvzBH0qJAoArT8rk",
            authDomain: "sppgbangunsari02-b5cb1.firebaseapp.com",
            projectId: "sppgbangunsari02-b5cb1",
            storageBucket: "sppgbangunsari02-b5cb1.firebasestorage.app",
            messagingSenderId: "497486447370",
            appId: "1:497486447370:web:0b2b6ce4297b48d18b70f3"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById("btnMasuk").addEventListener("click", async () => {
            const email = document.getElementById("email").value;
            const pass = document.getElementById("pass").value;
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                const userDoc = await getDoc(doc(db, "users", userCredential.user.uid));
                const role = userDoc.data().role;
                
                if (role === "admin") window.location.href = "admin.html";
                else if (role === "driver") window.location.href = "driver.html";
                else window.location.href = "lapor.html";
            } catch (err) { alert("Login Gagal: " + err.message); }
        });
    </script>
</body>
</html>
