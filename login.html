<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<script>
    // 1. Pastikan Config ini sudah diisi dengan data dari Project Settings Firebase Anda
    const firebaseConfig = {
        apiKey: "AIzaSy...", 
        authDomain: "...",
        projectId: "...",
        storageBucket: "...",
        messagingSenderId: "...",
        appId: "..."
    };

    // 2. Inisialisasi Firebase
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }

    // 3. Fungsi Login
    function handleLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        console.log("Mencoba login dengan:", email); // Ini akan muncul di Console (F12)

        firebase.auth().signInWithEmailAndPassword(email, password)
            .then((userCredential) => {
                console.log("Login sukses!");
                if (email === "admin@sppg.com") {
                    window.location.href = "admin.html";
                } else {
                    window.location.href = "lapor.html";
                }
            })
            .catch((error) => {
                console.error("Error Detail:", error.code, error.message);
                alert("Login Gagal: " + error.message);
            });
    }
</script>
